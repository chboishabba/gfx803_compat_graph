        :root {

            --text-secondary: #8b949e;
            --accent-blue: #58a6ff;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-purple: #bc8cff;
            --accent-orange: #d29922;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Outfit', sans-serif;
        }

        #cy {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Glassmorphism Panel */
        .ui-panel {
            position: absolute;
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            z-index: 10;
        }

        #header {
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 60px;
        }

        #header h1 {
            margin: 0;
            font-size: 20px;
            font-weight: 600;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #header .stats {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--text-secondary);
        }

        #details-panel {
            bottom: 20px;
            right: 20px;
            width: 350px;
            max-height: 80%;
            overflow-y: auto;
            display: none;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        #controls {
            top: 100px;
            left: 20px;
            width: 200px;
        }

        .control-group {
            margin-bottom: 20px;
        }

        .control-group h3 {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }

        .filter-chip {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            margin: 2px;
            cursor: pointer;
            border: 1px solid var(--border-color);
            transition: all 0.2s;
            background: rgba(48, 54, 61, 0.3);
        }

        .filter-chip:hover {
            border-color: var(--accent-blue);
        }

        .filter-chip.active {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
            color: white;
        }

        .detail-item {
            margin-bottom: 15px;
        }

        .detail-label {
            font-size: 10px;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .detail-value {
            font-size: 14px;
            word-break: break-all;
        }

        .tag {
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 10px;
            font-family: 'JetBrains Mono', monospace;
            display: inline-block;
            margin-top: 5px;
        }

        .tag-status { background: #238636; color: white; }
        .tag-kind { background: #1f6feb; color: white; }

        .search-box {
            width: 100%;
            background: #0d1117;
            border: 1px solid var(--border-color);
            color: white;
            padding: 8px;
            border-radius: 6px;
            font-family: inherit;
            margin-bottom: 15px;
        }

        .legend {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-size: 11px;
            color: var(--text-secondary);
        }

        /* Tooltip style details */
        .node-detail-card h2 {
            margin-top: 0;
            font-size: 18px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }

        .btn {
            background: var(--accent-blue);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
        }

        .btn:hover { background: #4ca1ff; }

        .loading-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--border-color);
            border-top: 4px solid var(--accent-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>

        const COLORS = {
            'hardware': '#58a6ff',
            'architecture': '#bc8cff',
            'driver': '#79c0ff',
            'runtime': '#ff7b72',
            'library': '#ffa657',
            'framework': '#3fb950',
            'workload': '#d29922',
            'observation': '#a5d6ff',
            'hypothesis': '#ffab70',
            'unknown': '#8b949e',
            'experiment': '#f85149',
            'metric': '#7ee787',
            'component': '#1f6feb',
            'repository': '#db6d28',
            'stack': '#f0883e',
            'rocm_version': '#58a6ff',
            'kernel_version': '#bc8cff',
            'framework_version': '#3fb950',
            'build_flag': '#ffa657',
            'runtime_flag': '#ffa657',
            'os': '#79c0ff',
            'issue': '#f85149',
            'discussion': '#f85149'
        };

        const EDGE_COLORS = {
            'causes': '#f85149',
            'breaks': '#f85149',
            'requires_test': '#ffa657',
            'helps_resolve': '#3fb950',
            'supports': '#3fb950'
        };

        async function init() {
            try {
                // If data wasn't injected, try to fetch it
                if (!graphData) {
                    const response = await fetch('out/gfx803_graph.json');
                    graphData = await response.json();
                }
                
                document.getElementById('graph-stats').textContent = 
                    `Nodes: ${graphData.nodes.length} | Edges: ${graphData.edges.length}`;

                const cyNodes = graphData.nodes.map(n => ({
                    data: { ...n }
                }));

                const cyEdges = graphData.edges.map((e, i) => ({
                    data: {
                        id: `e${i}`,
                        source: e.src,
                        target: e.dst,
                        ...e
                    }
                }));

                cy = cytoscape({
                    container: document.getElementById('cy'),
                    elements: { nodes: cyNodes, edges: cyEdges },
                    style: [
                        {
                            selector: 'node',
                            style: {
                                'background-color': (ele) => COLORS[ele.data('kind')] || '#8b949e',
                                'label': 'data(label)',
                                'color': '#ecf2f8',
                                'font-family': 'Outfit, sans-serif',
                                'font-size': '10px',
                                'text-valign': 'center',
                                'text-halign': 'center',
                                'width': (ele) => 20 + (ele.data('confidence') || 0.5) * 30,
                                'height': (ele) => 20 + (ele.data('confidence') || 0.5) * 30,
                                'border-width': 2,
                                'border-color': '#0d1117',
                                'text-wrap': 'wrap',
                                'text-max-width': '80px',
                                'ghost': 'yes',
                                'ghost-offset-x': 0,
                                'ghost-offset-y': 2,
                                'ghost-opacity': 0.2
                            }
                        },
                        {
                            selector: 'node:selected',
                            style: {
                                'border-width': 4,
                                'border-color': '#58a6ff',
                                'background-color': '#ecf2f8',
                                'color': '#0d1117'
                            }
                        },
                        {
                            selector: 'edge',
                            style: {
                                'width': (ele) => 1 + (ele.data('confidence') || 0.5) * 3,
                                'line-color': (ele) => EDGE_COLORS[ele.data('relation')] || '#30363d',
                                'target-arrow-color': (ele) => EDGE_COLORS[ele.data('relation')] || '#30363d',
                                'target-arrow-shape': 'triangle',
                                'curve-style': 'bezier',
                                'label': 'data(relation)',
                                'font-size': '8px',
                                'color': '#8b949e',
                                'text-rotation': 'autorotate',
                                'opacity': 0.6
                            }
                        },
                        {
                            selector: 'edge:selected',
                            style: {
                                'opacity': 1,
                                'width': 5,
                                'label': 'data(relation)',
                                'font-size': '10px',
                                'color': '#ecf2f8'
                            }
                        }
                    ],
                    layout: {
                        name: 'cose-bilkent',
                        animate: true,
                        idealEdgeLength: 100,
                        nodeOverlap: 20,
                        refresh: 20,
                        fit: true,
                        padding: 50,
                        randomize: true,
                        nodeRepulsion: 4500
                    }
                });

                // Populate kind filters
                const kinds = [...new Set(graphData.nodes.map(n => n.kind))].sort();
                const filterContainer = document.getElementById('kind-filters');
                kinds.forEach(kind => {
                    const chip = document.createElement('div');
                    chip.className = 'filter-chip active';
                    chip.textContent = kind;
                    chip.style.borderLeft = `4px solid ${COLORS[kind] || '#8b949e'}`;
                    chip.onclick = () => toggleFilter(kind, chip);
                    filterContainer.appendChild(chip);
                });

                // Interactivity
                cy.on('tap', 'node', e => {
                    const node = e.target.data();
                    showDetails(node);
                });

                cy.on('tap', e => {
                    if (e.target === cy) {
                        document.getElementById('details-panel').style.display = 'none';
                    }
                });

                document.getElementById('search').addEventListener('input', e => {
                    const val = e.target.value.toLowerCase();
                    cy.nodes().forEach(n => {
                        const label = n.data('label') || "";
                        if (label.toLowerCase().includes(val)) {
                            n.style('opacity', 1);
                        } else {
                            n.style('opacity', 0.1);
                        }
                    });
                });

                document.getElementById('loader').style.display = 'none';

            } catch (err) {
                console.error(err);
                document.getElementById('loader').innerHTML = `<p style="color:var(--accent-red)">Error loading graph data. Make sure run_demo.py was executed.</p>`;
            }
        }

        function showDetails(node) {
            const panel = document.getElementById('details-panel');
            const content = document.getElementById('details-content');
            panel.style.display = 'block';

            let html = `<h2>${node.label || node.id}</h2>`;
            html += `<div class="tag tag-kind" style="background:${COLORS[node.kind] || '#555'}">${node.kind}</div> `;
            html += `<div class="tag tag-status">${node.status}</div>`;
            
            html += `<div style="margin-top:20px">`;
            for (const [key, value] of Object.entries(node)) {
                if (['id', 'label', 'kind', 'status'].includes(key)) continue;
                html += `
                    <div class="detail-item">
                        <div class="detail-label">${key}</div>
                        <div class="detail-value">${value}</div>
                    </div>
                `;
            }
            html += `</div>`;
            
            content.innerHTML = html;
        }

        function toggleFilter(kind, chip) {
            chip.classList.toggle('active');
            const activeKinds = Array.from(document.querySelectorAll('.filter-chip.active')).map(c => c.textContent);
            cy.nodes().forEach(n => {
                if (activeKinds.includes(n.data('kind'))) {
                    n.show();
                } else {
                    n.hide();
                }
            });
        }

        function resetLayout() {
            cy.layout({ name: 'cose-bilkent', animate: true }).run();
            cy.fit();
        }

        window.onload = init;
    </script>
